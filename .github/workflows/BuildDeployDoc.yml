name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
      - dev
    tags: '*'
  pull_request:

jobs:
  build:
    permissions:
      contents: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.10'
      - name: Install dependencies
        run: julia --project=docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: clone integration test tools
        if: (github.event_name == 'push' && github.ref_name != 'main') || (github.event_name == 'pull_request' && github.base_ref != 'main')
        run: |
          git clone -b setDevDevCompat https://github.com/SimeonEhrig/QED.jl.git /tmp/integration_test_tools
      - name: get project name and version
        if: (github.event_name == 'push' && github.ref_name != 'main') || (github.event_name == 'pull_request' && github.base_ref != 'main')
        run: |
          $(julia --project=. /tmp/integration_test_tools/.ci/integTestGen/src/get_project_name_version.jl)
          echo "CI_DEPENDENCY_NAME -> $CI_DEPENDENCY_NAME"
          echo "CI_DEPENDENCY_VERSION -> $CI_DEPENDENCY_VERSION"
      - name: set dev dependencies
        if: (github.event_name == 'push' && github.ref_name != 'main') || (github.event_name == 'pull_request' && github.base_ref != 'main')
        run: |  
          julia --project=. -e 'import Pkg; Pkg.instantiate()'
          julia --project=docs/ /tmp/integration_test_tools/.ci/set_dev_dependencies.jl
          julia --project=. -e 'import Pkg; Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # If authenticating with GitHub Actions token
        run: julia --project=docs/ docs/make.jl
